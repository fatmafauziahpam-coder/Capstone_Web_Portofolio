<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body{
            background:#f8f5f7;
            font-family:Arial,sans-serif;
        }

        .container{
            width:700px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,.1);
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        textarea{
            height:150px;
        }

        button{
            background:#7b2946;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
        }

        a{
            margin-left:15px;
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Edit Profile</h2>

<form method="POST">

<input
type="text"
name="fullname"
placeholder="Nama"
value="{{ profile.fullname or '' }}">

<input
type="text"
name="profession"
placeholder="Profesi"
value="{{ profile.profession or '' }}">

<textarea
name="about"
placeholder="About">{{ profile.about or '' }}</textarea>

<input
type="email"
name="email"
placeholder="Email"
value="{{ profile.email or '' }}">

<input
type="text"
name="phone"
placeholder="Nomor HP"
value="{{ profile.phone or '' }}">

<input
type="text"
name="photo"
placeholder="Nama File Foto"
value="{{ profile.photo or '' }}">

<br><br>

<button type="submit">Simpan</button>

<a href="{{ url_for('dashboard') }}">Kembali</a>

</form>

</div>

</body>

</html>
