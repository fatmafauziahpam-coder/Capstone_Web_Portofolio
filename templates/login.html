<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<section class="login-section">

<div class="login-box">

<h2>Admin Login</h2>

<p>Welcome back.</p>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

{% with messages = get_flashed_messages() %}

{% if messages %}

<p>

{{ messages[0] }}

</p>

{% endif %}

{% endwith %}

</div>

</section>

</body>

</html>
