<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body{
            background:#f8f5f7;
            font-family:Arial, sans-serif;
            margin:0;
        }

        .container{
            width:90%;
            margin:40px auto;
        }

        h1{
            color:#7b2946;
        }

        .menu{
            display:flex;
            gap:15px;
            margin:25px 0;
        }

        .menu a{
            text-decoration:none;
            background:#7b2946;
            color:white;
            padding:12px 20px;
            border-radius:8px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            padding:12px;
            border:1px solid #ddd;
            text-align:left;
        }

        th{
            background:#7b2946;
            color:white;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Dashboard Admin</h1>

<p>Selamat datang <b>{{ current_user.username }}</b></p>

<div class="menu">

<a href="/project/add">Tambah Project</a>

<a href="/logout">Logout</a>

</div>

<table>

<tr>

<th>No</th>

<th>Judul</th>

<th>Github</th>

</tr>

{% for project in projects %}

<tr>

<tr>
    <th>No</th>
    <th>Judul</th>
    <th>Github</th>
    <th>Aksi</th>
</tr>

{% for project in projects %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ project.title }}</td>

<td>{{ project.github }}</td>

<td>
    <a href="{{ url_for('edit_project', id=project.id) }}">Edit</a> |
    <a href="{{ url_for('delete_project', id=project.id) }}"
       onclick="return confirm('Yakin ingin menghapus project ini?')">
       Hapus
    </a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
